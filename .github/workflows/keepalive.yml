name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 0-14 * * 1-5'  # 平日9時〜23時(JST) = UTC 0〜14時、10分ごと
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render
        run: |
          curl -s https://ses-work-automation.onrender.com/health
          echo "Pinged at $(date)"
